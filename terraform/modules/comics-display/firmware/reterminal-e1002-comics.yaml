# ─────────────────────────────────────────────────────────────────────────────
# reTerminal E1002  →  comics-display  (ESPHome firmware)
#
# The panel is dumb on purpose: every wake it does ONE HTTP GET for a
# pre-rendered 800x480 Spectra-6 PNG from the comics-display service, draws it,
# and deep-sleeps. All scraping / fitting / dithering happens server-side, so
# this firmware never changes when you add or drop comic sources.
#
# Fetch endpoint (the server advances the rotation on every hit, so each wake =
# a new comic):
#     http://<comics-display-ip>:8080/next.png
# Use /current.png instead if you want the SAME comic until the server rotates.
#
# Requirements:
#   * ESPHome >= 2025.11.1 (adds the `Seeed-reTerminal-E1002` epaper_spi model).
#   * A secrets.yaml with wifi_ssid / wifi_password.
#
# ⚠ BOARD PIN MAP: clk/mosi are confirmed for the E1002; the display
#   cs/dc/reset/busy pins are board-revision specific. If the panel stays blank,
#   copy the `spi:` + `display:` pin values from Seeed's official ESPHome
#   cookbook example for the reTerminal E1002 (the authoritative source) — only
#   those pins are board-specific; everything else here is correct as-is.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  name: comics-display
  # Points at the comics-display LXC (907). /next.png rotates on each fetch.
  comic_url: "http://192.168.6.89:8080/next.png"
  # How long to sleep between comics. E-paper + battery want this LONG (hours),
  # not a slideshow — a Spectra-6 full refresh is ~15-30 s and wears the panel.
  refresh_hours: "6"

esphome:
  name: ${name}
  friendly_name: Comics Display
  on_boot:
    priority: -100
    # Wait for Wi-Fi, then pull the comic. The online_image on_download_finished
    # handler draws it and puts us back to sleep.
    then:
      - wait_until:
          condition:
            wifi.connected:
      - online_image.update: comic_img

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: esp-idf

logger:
api:
ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true   # shorten the awake window → longer battery life

# Wake, refresh + draw, then sleep. run_duration is the awake budget; if Wi-Fi or
# the fetch stalls we still sleep rather than draining the battery (the on_error
# handler below also forces sleep).
deep_sleep:
  id: deep_sleep_ctl
  run_duration: 60s
  sleep_duration: ${refresh_hours}h

http_request:
  useragent: reterminal-e1002-comics
  timeout: 30s
  verify_ssl: false          # comics-display is plain HTTP on the LAN

online_image:
  - id: comic_img
    url: ${comic_url}
    format: PNG
    type: RGB565
    # 800x480 RGB565 needs a big decode buffer; the E1002's 8 MB PSRAM covers it.
    buffer_size: 65536
    update_interval: never    # triggered manually from on_boot, above
    on_download_finished:
      then:
        - component.update: epd
        - delay: 3s            # let the e-paper finish its refresh waveform
        - deep_sleep.enter: deep_sleep_ctl
    on_error:
      then:
        # Couldn't fetch (server down / Wi-Fi flaky) — keep the last image and
        # retry next wake instead of hot-looping the radio.
        - logger.log: "comic fetch failed — sleeping, will retry next wake"
        - deep_sleep.enter: deep_sleep_ctl

# SPI bus to the panel (clk/mosi per Seeed's official E1002 ESPHome cookbook).
spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

# Reconciled against Seeed's official cookbook
# (https://wiki.seeedstudio.com/reterminal_e10xx_with_esphome/, verified
# 2026-07). The integrated `Seeed-reTerminal-E1002` model (ESPHome >= 2025.11.1)
# PREDEFINES cs/dc/reset/busy internally — do NOT respecify them here. An earlier
# draft added explicit pins with a NON-inverted busy_pin, which is the classic
# "display stuck initializing" failure (esphome/esphome#12012): the E1002 busy
# line is active-low (inverted: true). Letting the model own the pins avoids it.
display:
  - platform: epaper_spi
    id: epd
    model: Seeed-reTerminal-E1002
    update_interval: never
    lambda: |-
      it.image(0, 0, id(comic_img));

# --- Fallback for ESPHome < 2025.11.1 (no integrated E1002 model) --------------
# If your ESPHome predates the integrated model, delete the display block above
# and use this explicit-pin form instead (pins + inverted flags per the cookbook;
# note busy_pin inverted: true):
#   display:
#     - platform: epaper_spi
#       id: epd
#       model: 7.3in-spectra-e6
#       cs_pin: GPIO10
#       dc_pin: GPIO11
#       reset_pin:
#         number: GPIO12
#         inverted: false
#       busy_pin:
#         number: GPIO13
#         inverted: true
#       update_interval: never
#       lambda: |-
#         it.image(0, 0, id(comic_img));
